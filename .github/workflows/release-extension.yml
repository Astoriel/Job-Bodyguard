name: Build Release Asset

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to upload to
        required: true

permissions:
  contents: write

jobs:
  build-extension-asset:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build extension
        run: pnpm --filter @job-bodyguard/extension build

      - name: Create archive
        run: |
          cd apps/extension/dist
          zip -r ../../../job-bodyguard-extension-${{ github.event.release.tag_name || inputs.tag }}.zip .

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload ${{ github.event.release.tag_name || inputs.tag }} job-bodyguard-extension-${{ github.event.release.tag_name || inputs.tag }}.zip --clobber
